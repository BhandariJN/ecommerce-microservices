spring:
  mongodb:
    username: admin
    password: admin
    host: localhost
    port: 27017
    database: notification
    authentication-database: admin



  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: paymentGroup, orderGroup
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted-packages: '*'
        spring.json.type.mapping: paymentConfirmation:com.jn.notification.kafka.payment.PaymentConfirmation, orderConfirmation:com.jn.notification.kafka.order.OrderConfirmation

  mail:
    host: localhost
    port: 1025
    username: admin
    password: admin
    properties:
      mail:
        smtp:
          trust: "*"
          auth: true
          starttls:
            enable: true
          connection-timeout: 5000
          timeout: 3000
          write-timeout: 3000


server:
  port: 8040
